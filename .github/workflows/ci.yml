name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Lint (full repo)
        run: uv run ruff check .
      - name: Check formatting (full repo)
        run: uv run ruff format --check .
      - name: Run Python tests (non-integration, full repo)
        run: uv run pytest -v -m "not integration"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Detect changed frontend files
        id: frontend_changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          mapfile -t lint_files < <(
            git diff --diff-filter=ACMR --name-only "$base_sha" HEAD -- frontend/src \
              | grep -E '\.(ts|tsx)$' \
              | sed 's#^frontend/##' \
              || true
          )

          {
            echo "lint_count=${#lint_files[@]}"
            echo 'lint_files<<EOF'
            printf '%s\n' "${lint_files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - run: npx tsc --noEmit
      - name: Lint changed frontend files
        if: steps.frontend_changes.outputs.lint_count != '0'
        run: |
          files=()
          while IFS= read -r file; do
            [[ -n "$file" ]] && files+=("$file")
          done <<< "${{ steps.frontend_changes.outputs.lint_files }}"
          npx eslint "${files[@]}"
      - run: npx vite build
